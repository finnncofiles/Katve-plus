<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katve+ WMTS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
body{margin:0;background:#0b0f13;color:#e6edf3;font-family:system-ui}
#map{height:100vh}
.top{position:absolute;top:6px;left:6px;right:6px;display:flex;justify-content:space-between;z-index:1000}
.box{background:#111820;border:1px solid #24313c;border-radius:6px;padding:6px 10px}
.bottom{position:absolute;bottom:6px;left:6px;right:6px;z-index:1000}
.panel{background:#111820;border:1px solid #24313c;border-radius:6px;padding:10px}
.poi{width:12px;height:12px;border-radius:50%;background:#c6a15b;border:2px solid #000}
</style>
</head>
<body>

<div id="map"></div>

<div class="top">
<div class="box">Katve+</div>
<div class="box" id="bearing">3200</div>
</div>

<div class="bottom">
<div class="panel">WMTS kartta + DEM valmis</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

const API="bed0c8b5-f42c-49fe-af0a-52da582dd0aa";

const map=L.map("map",{center:[60.17,24.94],zoom:13});

// ✅ WORKING WMTS (XYZ proxy)
const mml=L.tileLayer(
"https://avoin-karttakuva.maanmittauslaitos.fi/v2/maastokartta/{z}/{x}/{y}.png?api-key="+API,
{maxZoom:18, attribution:"MML"}
).addTo(map);

// marker
const marker=L.marker(map.getCenter(),{
draggable:true,
icon:L.divIcon({html:'<div class="poi"></div>',iconSize:[12,12],className:''})
}).addTo(map);

map.on("click",e=>marker.setLatLng(e.latlng));

// bearing
function degToMil(d){return Math.round(d/360*6400)}

map.on("mousemove",e=>{
const c=marker.getLatLng();
const dx=e.latlng.lng-c.lng;
const dy=e.latlng.lat-c.lat;
const deg=(Math.atan2(dx,dy)*180/Math.PI+360)%360;
document.getElementById("bearing").innerText=degToMil(deg);
});

</script>

</body>
</html>
